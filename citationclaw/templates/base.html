<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CitationClaw v2{% endblock %}</title>
    <link rel="icon" href="/static/head_logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/static/css/style.css?v=2.0.0" rel="stylesheet">
</head>
<body>
    <nav class="agent-navbar">
        <div class="agent-navbar-inner">
            <a href="/" class="agent-brand">
                <div class="agent-brand-icon">
                    <img src="/static/head_logo.png" width="28" height="28" alt="CitationClaw" style="display:block">
                </div>
                <div>
                    <div class="agent-brand-name">CitationClaw <span style="font-size:12px;font-weight:500;color:var(--accent);background:var(--accent-light);padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle">v2</span></div>
                    <div class="agent-brand-sub">Turning Every Citation into Explainable Impact</div>
                </div>
            </a>
            <button class="agent-navbar-toggler" type="button" aria-label="Toggle navigation" onclick="this.parentElement.querySelector('.agent-nav-links').classList.toggle('show')">
                <i class="bi bi-list"></i>
            </button>
            <div class="agent-nav-links">
                <a href="#" class="agent-nav-link" data-spa-panel="home">
                    <i class="bi bi-house-fill"></i> 首页
                </a>
                <a href="#" class="agent-nav-link" data-spa-panel="results">
                    <i class="bi bi-folder2-open"></i> 结果
                </a>
            </div>
        </div>
    </nav>

    <div class="agent-page-content">
        {% block content %}{% endblock %}
    </div>

    <footer class="agent-footer">
        <small>CitationClaw v2 &nbsp;·&nbsp; 上海交通大学 VisionXLab@RethinkLab</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
